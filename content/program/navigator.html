<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Camp Claude — Internal Navigator</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #F4EEE3;
    --paper-soft: #EBE3D3;
    --cream: #FBF7EE;
    --ink: #1F1C17;
    --ink-soft: #3A352D;
    --muted: #807668;
    --line: rgba(31, 28, 23, 0.18);
    --line-soft: rgba(31, 28, 23, 0.10);
    --rust: #B5532A;
    --sage: #6B7A5A;
    --serif: "Instrument Serif", Georgia, serif;
    --sans: "Inter Tight", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  body { display: flex; height: 100vh; overflow: hidden; font-size: 15px; line-height: 1.5; }

  /* ── Sidebar ─────────────────────────────── */
  aside {
    width: 360px; min-width: 360px;
    background: var(--paper-soft);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 32px 28px 60px;
  }
  aside h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: 32px; letter-spacing: -0.01em;
    margin: 0 0 2px; font-style: italic;
  }
  aside .sub {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 24px;
  }
  .section-title {
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--rust); margin: 26px 0 10px; font-weight: 500;
  }
  .file-link {
    display: block; padding: 7px 0;
    color: var(--ink); text-decoration: none;
    font-size: 14px; line-height: 1.35;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: color 0.12s ease;
  }
  .file-link:hover { color: var(--rust); }
  .file-link.active { color: var(--rust); font-weight: 500; }
  .file-link .ext {
    font-family: var(--mono); font-size: 9px;
    color: var(--muted); letter-spacing: 0.16em;
    text-transform: uppercase; margin-left: 6px;
  }

  /* ── Content pane ────────────────────────── */
  main {
    flex: 1; overflow-y: auto;
    padding: 52px 72px 80px;
    max-width: 880px;
  }
  main h1, main h2, main h3 {
    font-family: var(--serif); font-weight: 400;
    letter-spacing: -0.012em; line-height: 1.15;
    color: var(--ink); margin-top: 1.5em; margin-bottom: 0.4em;
  }
  main h1 { font-size: 48px; margin-top: 0; }
  main h2 { font-size: 30px; border-top: 1px solid var(--line); padding-top: 32px; margin-top: 48px; }
  main h3 { font-size: 22px; }
  main h1 em, main h2 em, main h3 em { color: var(--rust); font-style: italic; }
  main p { margin: 0 0 1.1em; max-width: 68ch; }
  main ul, main ol { max-width: 68ch; padding-left: 22px; }
  main li { margin-bottom: 6px; }
  main blockquote {
    border-left: 3px solid var(--rust);
    padding: 6px 0 6px 18px; margin: 1em 0;
    color: var(--ink-soft); font-style: italic;
  }
  main hr {
    border: none; border-top: 1px solid var(--line);
    margin: 32px 0;
  }
  main a { color: var(--rust); text-decoration: none; border-bottom: 1px solid rgba(181,83,42,0.3); }
  main a:hover { border-bottom-color: var(--rust); }
  main code {
    font-family: var(--mono); font-size: 12px;
    background: var(--cream); padding: 2px 5px; border-radius: 3px;
    border: 1px solid var(--line-soft);
  }
  main pre {
    background: var(--cream); padding: 16px 20px;
    border-radius: 4px; overflow-x: auto;
    border: 1px solid var(--line-soft);
    font-size: 13px; line-height: 1.5;
  }
  main pre code { background: none; border: none; padding: 0; font-size: 13px; }
  main table {
    border-collapse: collapse;
    margin: 20px 0; font-size: 14px;
    border: 1px solid var(--line);
  }
  main th, main td {
    border: 1px solid var(--line);
    padding: 10px 14px; text-align: left;
    vertical-align: top;
  }
  main th {
    background: var(--ink); color: var(--paper);
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500;
  }
  main tr:nth-child(even) td { background: var(--cream); }

  /* ── Notice and empty state ──────────────── */
  .notice {
    background: var(--cream);
    border-left: 3px solid var(--rust);
    padding: 16px 22px;
    margin: 24px 0;
    font-size: 14px; line-height: 1.55;
  }
  .notice code { background: white; }
  .muted-note {
    color: var(--muted); font-size: 13px;
    font-family: var(--mono); letter-spacing: 0.05em;
  }

  /* ── Tiny responsive ─────────────────────── */
  @media (max-width: 900px) {
    body { flex-direction: column; }
    aside { width: 100%; min-width: 0; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--line); }
    main { padding: 24px; }
    main h1 { font-size: 32px; }
  }
</style>
</head>
<body>

<aside>
  <h1>Camp Claude</h1>
  <div class="sub">Internal Navigator</div>
  <div id="file-tree"></div>
</aside>

<main id="content">
  <h1>Welcome</h1>
  <p class="muted-note">Loading…</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
<script>
  const TREE = {
    'Start here': [
      { name: 'README', path: '../README.md' },
    ],
    'Teach — learner-facing concepts': [
      { name: 'Chat vs Cowork vs Code', path: '../teach/chat-vs-cowork-vs-code.md' },
      { name: 'Skills vs Connectors vs Plugins', path: '../teach/skills-vs-connectors-vs-plugins.md' },
      { name: 'Interface Tour', path: '../teach/interface-tour.md' },
      { name: 'Cowork Task Anatomy', path: '../teach/cowork-task-anatomy.md' },
      { name: 'Automation Equation', path: '../teach/automation-equation.md' },
      { name: 'Settings Tour', path: '../teach/settings-tour.md' },
      { name: 'Models and Tokens', path: '../teach/models-and-tokens.md' },
    ],
    'Program — facilitator-facing design': [
      { name: 'Syllabus (full cohort)', path: 'syllabus.md' },
      { name: 'Foundations Curriculum (4-session)', path: 'foundations-curriculum.md' },
      { name: 'Facilitator Guide', path: 'facilitator-guide.md' },
      { name: 'Asset Library (master index)', path: 'asset-library.md' },
      { name: 'Content Production Map', path: 'content-production-map.md' },
      { name: 'Brand System', path: 'brand-system.md' },
      { name: 'Agent Training Notes', path: 'agent-training-notes.md' },
      { name: 'Asset Plan (Word doc)', path: 'asset-plan.docx', external: true, label: 'DOCX' },
    ],
    'Reference — non-teaching reference': [
      { name: 'Connectors by Industry', path: '../reference/connectors-by-industry.md' },
      { name: 'Connector Governance Pattern', path: '../reference/connector-governance-pattern.md' },
      { name: 'Compliance Mental Model', path: '../reference/compliance-mental-model.md' },
      { name: 'Agent Security Model', path: '../reference/agent-security-model.md' },
      { name: 'Zenith Case Study', path: '../reference/zenith-connector-governance.pdf', external: true, label: 'PDF' },
    ],
    'Skills — CLAUDE.md files': [
      { name: 'Deck Generator Skill', path: '../skills/deck-generator.md' },
    ],
    'Decks — rendered presentations': [
      { name: 'Foundations Session 1 · Three Doors', path: '../decks/foundations-session-1/index.html', external: true, label: 'DECK' },
      { name: 'Models & Tokens (reference deck)', path: '../decks/models-and-tokens/index.html', external: true, label: 'DECK' },
    ],
    'Marketing': [
      { name: 'Landing Page', path: '../marketing/landing.html', external: true, label: 'HTML' },
    ],
  };

  const tree = document.getElementById('file-tree');
  const content = document.getElementById('content');

  // Render sidebar
  for (const [section, files] of Object.entries(TREE)) {
    const h = document.createElement('div');
    h.className = 'section-title';
    h.textContent = section;
    tree.appendChild(h);

    for (const file of files) {
      const a = document.createElement('a');
      a.className = 'file-link';
      a.textContent = file.name;
      if (file.label) {
        const tag = document.createElement('span');
        tag.className = 'ext';
        tag.textContent = file.label;
        a.appendChild(tag);
      }
      if (file.external) {
        a.href = file.path;
        a.target = '_blank';
        a.rel = 'noopener';
      } else {
        a.href = '#' + encodeURIComponent(file.path);
        a.addEventListener('click', (e) => {
          e.preventDefault();
          load(file.path, a);
        });
      }
      tree.appendChild(a);
    }
  }

  // Render a markdown file in the content pane
  async function load(path, link) {
    document.querySelectorAll('.file-link.active').forEach(a => a.classList.remove('active'));
    link.classList.add('active');

    content.innerHTML = '<p class="muted-note">Loading…</p>';

    try {
      const r = await fetch(path);
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      const text = await r.text();

      // Render markdown
      marked.setOptions({ breaks: false, gfm: true });
      content.innerHTML = marked.parse(text);

      // Rewrite relative links to open in same pane if .md, new tab otherwise
      content.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.startsWith('http') || href.startsWith('#')) return;

        // Resolve relative path
        const currentDir = path.split('/').slice(0, -1).join('/');
        const resolved = resolvePath(currentDir, href);

        if (resolved.endsWith('.md')) {
          a.href = '#' + encodeURIComponent(resolved);
          a.addEventListener('click', (e) => {
            e.preventDefault();
            // Find matching link in sidebar or just load it
            const sidebarLink = Array.from(document.querySelectorAll('.file-link'))
              .find(l => l.getAttribute('href') === '#' + encodeURIComponent(resolved));
            if (sidebarLink) sidebarLink.click();
            else load(resolved, link);
          });
        } else {
          a.href = resolved;
          a.target = '_blank';
          a.rel = 'noopener';
        }
      });

      // Scroll to top
      content.parentElement?.scrollTo?.(0, 0);
      content.scrollTop = 0;
      window.scrollTo(0, 0);
    } catch (err) {
      content.innerHTML = `
        <h1>Can't preview in file:// mode</h1>
        <div class="notice">
          Browsers block markdown fetches when this page is opened directly as a file.
          To enable live preview, run:
          <pre>cd /Users/hoff/dev/RUDI/edu/campclaude/content
python3 -m http.server 8787</pre>
          Then open <a href="http://localhost:8787/program/navigator.html">http://localhost:8787/program/navigator.html</a> in your browser.
        </div>
        <p>For now, you can <a href="${path}" target="_blank">open the file directly</a>.</p>
      `;
    }
  }

  function resolvePath(base, rel) {
    if (rel.startsWith('/')) return rel.slice(1);
    const parts = (base ? base.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
      if (p === '' || p === '.') continue;
      if (p === '..') out.pop();
      else out.push(p);
    }
    return out.join('/');
  }

  // Auto-load README on first visit (or the hash target)
  window.addEventListener('DOMContentLoaded', () => {
    const hash = decodeURIComponent(location.hash.slice(1));
    if (hash) {
      const link = Array.from(document.querySelectorAll('.file-link'))
        .find(l => l.getAttribute('href') === '#' + encodeURIComponent(hash));
      if (link) { link.click(); return; }
    }
    document.querySelector('.file-link')?.click();
  });
</script>

</body>
</html>
